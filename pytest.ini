[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwbots_core: Core functionality and integration tests
    xwbots_unit: Unit tests for individual components
    xwbots_integration: Integration tests across modules
    xwbots_advance: Advance quality tests (v1.0.0+)
    xwbots_security: Security excellence tests (Priority #1)
    xwbots_usability: Usability excellence tests (Priority #2)
    xwbots_maintainability: Maintainability excellence tests (Priority #3)
    xwbots_performance: Performance excellence tests (Priority #4)
    xwbots_extensibility: Extensibility excellence tests (Priority #5)

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -x

